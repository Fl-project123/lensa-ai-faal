<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lensa AI Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#131314">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #131314;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
        }
        
        /* Top Bar Modern untuk Tempat Tombol Instal */
        .top-bar {
            width: 100%;
            background-color: #1e1f20;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #303132;
            z-index: 100;
        }
        .brand-title {
            color: #e3e2e6;
            font-size: 16px;
            font-weight: 600;
        }
        
        /* Desain Tombol Instal Keren */
        .btn-install {
            background-color: #a8c7fa;
            color: #04305e;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: none; /* Sembunyi secara default, muncul jika didukung browser */
            transition: background-color 0.2s;
        }
        .btn-install:hover {
            background-color: #c2e7ff;
        }

        /* Bingkai Utama Pembungkus Google AI Studio */
        .app-container {
            flex: 1;
            width: 100%;
            border: none;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Animasi Splash Screen */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #131314;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        .logo-animation {
            width: 60px;
            height: 60px;
            border: 4px solid #303132;
            border-top: 4px solid #a8c7fa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .splash-text {
            color: #e3e2e6;
            margin-top: 20px;
            font-size: 14px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .fade-out {
            opacity: 0;
            visibility: hidden;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="logo-animation"></div>
        <div class="splash-text">Memuat Lensa AI Pro...</div>
    </div>

    <div class="top-bar" id="app-bar">
        <div class="brand-title">Lensa AI Pro</div>
        <button class="btn-install" id="install-button">Instal Aplikasi</button>
    </div>

    <div class="app-container">
        <iframe src="https://aistudio.google.com/apps/c3694fc4-79b8-4fd2-9cae-ce09683c876f?fullscreenApplet=true" allow="camera; microphone; geolocation"></iframe>
    </div>

    <script>
        // 1. Registrasi Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker aman terdaftar!'));
            });
        }

        // 2. Menghilangkan Splash Screen setelah halaman siap
        window.addEventListener('load', () => {
            const splash = document.getElementById('splash-screen');
            setTimeout(() => { splash.classList.add('fade-out'); }, 1000);
        });

        // 3. LOGIKA TOMBOL INSTAL KUSTOM
        let deferredPrompt;
        const installButton = document.getElementById('install-button');
        const appBar = document.getElementById('top-bar');

        // Menangkap event "siap instal" dari Google Chrome
        window.addEventListener('beforeinstallprompt', (e) => {
            // Cegah Chrome memunculkan mini-infobar bawaan di bawah layar
            e.preventDefault();
            // Simpan event-nya agar bisa dieksekusi saat tombol diklik
            deferredPrompt = e;
            // Tampilkan tombol instal kustom milik kita di Top Bar
            installButton.style.display = 'block';
        });

        // Aksi ketika tombol "Instal Aplikasi" diklik oleh user
        installButton.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            
            // Munculkan pop-up konfirmasi instalasi bawaan Chrome secara resmi
            deferredPrompt.prompt();
            
            // Tunggu respon dari user (apakah klik Instal atau Batal)
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`User memilih: ${outcome}`);
            
            // Bersihkan variabel karena prompt hanya bisa dipakai sekali
            deferredPrompt = null;
            // Sembunyikan kembali tombolnya setelah sukses diinstal
            installButton.style.display = 'none';
        });

        // Sembunyikan tombol secara otomatis jika aplikasi sudah terinstal di HP (Mode Standalone)
        if (window.matchMedia('(display-mode: standalone)').matches) {
            installButton.style.display = 'none';
            // Opsional: Kamu juga bisa menyembunyikan seluruh Top Bar jika aplikasi sudah terinstal
            // document.getElementById('app-bar').style.display = 'none';
        }
    </script>
</body>
</html>
